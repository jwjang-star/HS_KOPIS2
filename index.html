
<style>
/* ─────────────────────────────────────────────
   기본 리셋 & 대시보드 외곽
───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
.db{
  font-family:var(--font-sans);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  overflow:hidden;
  background:var(--color-background-primary)
}

/* ─────────────────────────────────────────────
   상단 컨트롤 바 (변경 없음)
───────────────────────────────────────────── */
.topbar{
  padding:10px 14px;
  border-bottom:0.5px solid var(--color-border-tertiary);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--color-background-primary)
}
.logo-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-icon{width:30px;height:30px;border-radius:7px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;color:#185FA5;font-size:16px}
.logo-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.logo-sub{font-size:10px;color:var(--color-text-tertiary)}
.vd{width:1px;height:22px;background:var(--color-border-tertiary);flex-shrink:0}
.ctrl{display:flex;align-items:center;gap:5px}
.clabel{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
input[type=date],select{font-size:11px;padding:4px 7px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);height:30px;cursor:pointer}
.srv-input{font-size:11px;padding:4px 8px;height:30px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-mono);width:175px}
.srv-wrap {
  display: flex;
  flex-direction: column;   /* 배지와 입력창을 세로로 쌓기 */
  gap: 4px;
  position: relative;
}
.srv-badge {
  cursor: pointer;          /* [변경] 기존: cursor 없음 → pointer 추가 (클릭 가능 표시) */
  user-select: none;
}
.srv-badge:hover {
  border-color: var(--color-border-secondary);
}
/* URL 입력창 슬라이드 영역 */
.srv-detail {
  max-height: 0;            /* [변경] 기본: 숨김 (height 대신 max-height 사용 — transition 적용 위해) */
  overflow: hidden;
  transition: max-height 0.2s ease;   /* 부드럽게 열림 */
}
.srv-detail.open {
  max-height: 40px;         /* [변경] 열렸을 때 최대 높이 */
}
/* 배지 안 꺾쇠 아이콘 회전 */
.srv-chevron {
  font-size: 10px;
  transition: transform 0.2s ease;
  margin-left: 2px;
}
.srv-badge.open .srv-chevron {
  transform: rotate(180deg);   /* [변경] 열리면 아이콘 뒤집기 */
}
.btn-go{display:flex;align-items:center;gap:4px;font-size:12px;padding:0 13px;height:30px;border-radius:var(--border-radius-md);background:#185FA5;color:#E6F1FB;border:none;cursor:pointer;font-weight:500;white-space:nowrap}
.btn-go:hover{background:#0C447C}
.btn-go:disabled{opacity:.5;cursor:not-allowed}
.srv-badge{display:flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);white-space:nowrap}
.srv-dot{width:6px;height:6px;border-radius:50%;background:#888}
.srv-dot.ok{background:#639922}
.srv-dot.err{background:#E24B4A}
.srv-dot.chk{animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ─────────────────────────────────────────────
   [변경1] 바디 2컬럼 비율 수정
   기존: grid-template-columns: minmax(0,1fr) 0.5px minmax(0,295px)
         min-height: 520px
   변경: 지도 패널 최대폭을 고정(380px)하고, 리스트 패널이 나머지를 채우게 함
         min-height도 480px로 줄여서 전체 높이 압축
   이유: 지도가 전체 화면의 70% 이상을 차지해서 오른쪽 리스트와 불균형
───────────────────────────────────────────── */
.body{
  display:grid;
  grid-template-columns: minmax(0,380px) 0.5px minmax(0,1fr); /* [변경1] 기존: minmax(0,1fr) 0.5px minmax(0,295px) */
  min-height:460px; /* [변경1] 기존: 520px */
}
.col-div{background:var(--color-border-tertiary)}

/* ─────────────────────────────────────────────
   좌: 지도 패널
───────────────────────────────────────────── */
.map-col{display:flex;flex-direction:column;gap:8px;padding:10px}

/* ─────────────────────────────────────────────
   [변경2] 통계 카드 높이 압축
   기존: padding:9px 11px / font-size:22px
   변경: padding:7px 10px / font-size:18px
   이유: 지도와 stats 카드가 너무 세로를 많이 차지해서 전체 비율이 깨짐
───────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.scard{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px 10px} /* [변경2] 기존: 9px 11px */
.scard-n{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.1} /* [변경2] 기존: 22px */
.scard-l{font-size:10px;color:var(--color-text-secondary);margin-top:2px}

/* ─────────────────────────────────────────────
   [변경3] 지도 박스 높이 제한
   기존: min-height:300px (최소높이만 있고 최대없음 → 무한정 늘어남)
   변경: min-height:240px + max-height:320px 추가
   이유: 지도가 부모 flex 컨테이너를 꽉 채워서 화면을 압도함
───────────────────────────────────────────── */
.map-box{
  background:var(--color-background-secondary);
  border-radius:var(--border-radius-lg);
  border:0.5px solid var(--color-border-tertiary);
  overflow:hidden;
  flex:1;
  min-height:240px; /* [변경3] 기존: 300px */
  max-height:320px; /* [변경3] 신규 추가 — 이게 핵심. 지도 최대 높이 제한 */
  position:relative
}
#kmap{width:100%;height:100%;display:block}

/* ─────────────────────────────────────────────
   SVG 지역 path 스타일 (변경 없음)
───────────────────────────────────────────── */
.rpath{stroke:#fff;stroke-width:0.8;cursor:pointer;transition:fill .12s;fill-opacity:1}
.rpath:hover{stroke-width:1.5;stroke:#185FA5}
.rpath.selected{stroke:#042C53;stroke-width:1.8}

/* ─────────────────────────────────────────────
   [변경4] 라벨 폰트 크기 조정
   기존: .rlabel { font-size:8px } / .rlabel.metro { font-size:7px }
   변경: 둘 다 7.5px로 통일 + font-weight:400 (얇게 해서 겹쳐도 덜 답답하게)
   이유: 광역시 라벨이 작아서 안보이고, 도(道) 라벨은 너무 커서 경계에 걸림
───────────────────────────────────────────── */
.rlabel{
  font-size:7.5px; /* [변경4] 기존: 8px */
  fill:#1a3a05;
  pointer-events:none;
  font-family:var(--font-sans);
  font-weight:400; /* [변경4] 기존: 500 (bold → regular로 얇게) */
}
.rlabel.metro{
  font-size:7.5px; /* [변경4] 기존: 7px */
  fill:#04342C
}
.rlabel.selected{fill:#042C53}

.mtt{position:absolute;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:4px 9px;font-size:11px;color:var(--color-text-primary);pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap;top:10px;left:10px;z-index:10}
.legend {
  position: absolute;           /* [변경] 기존: static (flex 흐름) → absolute */
  bottom: 8px;                  /* [변경] 기존: 없음 → 하단 8px */
  left: 50%;                    /* [변경] 기존: 없음 → 가로 중앙 기준점 */
  transform: translateX(-50%);  /* [변경] 기존: 없음 → 정확한 중앙 정렬 */
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;      /* [변경] 기존: 없음 → 아이템 중앙 정렬 */
  background: var(--color-background-primary);   /* [변경] 기존: 없음 → 지도 위에 뜨므로 배경 추가 */
  border: 0.5px solid var(--color-border-tertiary); /* [변경] 기존: 없음 → 경계 구분 */
  border-radius: var(--border-radius-md);
  padding: 4px 10px;            /* [변경] 기존: 없음 → 내부 여백 */
  z-index: 5;                   /* [변경] 기존: 없음 → 지도 path 위에 표시 */
  white-space: nowrap;
}

/* .leg, .leg-dot — 변경 없음 */
.leg { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--color-text-secondary); }
.leg-dot { width:9px; height:9px; border-radius:2px; }

/* ─────────────────────────────────────────────
   우: 리스트 패널 (변경 없음)
───────────────────────────────────────────── */
.list-col{display:flex;flex-direction:column;overflow:hidden}
.lhead{padding:10px 13px 8px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ltitle{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.lcnt{font-size:11px;padding:2px 8px;border-radius:20px;background:#E6F1FB;color:#0C447C}
.rtabs {
  display: flex;
  flex-wrap: wrap;              /* [변경] 기존: 없음 (nowrap 기본값) → wrap으로 줄바꿈 허용 */
  gap: 4px;
  padding: 7px 10px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  flex-shrink: 0;}
.rtabs::-webkit-scrollbar{display:none}
.rtab{font-size:10px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0}
.rtab:hover{border-color:#378ADD;color:#185FA5}
.rtab.on{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}

/* ─────────────────────────────────────────────
   [변경5] 공연 리스트 max-height 비율 조정
   기존: max-height:370px
   변경: max-height:360px (전체 높이 줄었으므로 리스트도 함께 조정)
───────────────────────────────────────────── */
.plist{overflow-y:auto;flex:1;max-height:360px} /* [변경5] 기존: 370px */
.pitem{display:flex;gap:9px;padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)}
.pitem:last-child{border-bottom:none}
.pitem:hover{background:var(--color-background-secondary)}
.poster{width:36px;height:50px;border-radius:4px;background:#EAF3DE;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.poster img{width:100%;height:100%;object-fit:cover}
.pinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.ptitle{font-size:11px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pvenue{font-size:10px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdate{font-size:10px;color:var(--color-text-tertiary)}
.ptags{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 5px;border-radius:8px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.tag-on{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.tag-pre{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.tag-end{background:var(--color-background-secondary)}
.tag-open{background:#FAEEDA;color:#633806;border-color:#FAC775}
.smsg{padding:30px 14px;text-align:center;color:var(--color-text-tertiary);font-size:12px;line-height:2}
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:30px;color:var(--color-text-tertiary);font-size:12px}
.spin{width:18px;height:18px;border:2px solid var(--color-border-tertiary);border-top-color:#185FA5;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err-banner{padding:7px 12px;font-size:10px;line-height:1.7;border-top:0.5px solid var(--color-border-tertiary);display:none;flex-shrink:0;background:#FCEBEB;color:#A32D2D}
.urlbox{padding:7px 12px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
.ulabel{font-size:10px;color:var(--color-text-tertiary);margin-bottom:2px}
.utext{font-size:9px;color:var(--color-text-secondary);word-break:break-all;line-height:1.5;font-family:var(--font-mono)}
</style>

/* ══════════════════════════════════════════════

function buildMap(){
  const svg = document.getElementById('kmap');
  svg.innerHTML = '';

  // 도(道) 먼저, 광역시 나중 → z-order 상 광역시가 위에 그려져 클릭 우선권 가짐
  const sorted = [...REAL_MAP_PATHS].sort((a,b)=>{
    if(a.type===b.type) return 0;
    return a.type==='do' ? -1 : 1;
  });

  sorted.forEach(r => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');

    // path 요소
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', r.d);
    path.setAttribute('fill', getFill(r.code));
    path.setAttribute('class','rpath'+(r.code===selCode?' selected':''));
    path.setAttribute('data-code', r.code);
    path.setAttribute('data-type', r.type);
    path.setAttribute('role','button');
    path.setAttribute('aria-label',`${r.name} 선택 (signgucode: ${r.code})`);

    /* [변경8] 라벨 위치: 기존 getCenter(r.d) 자동계산 → LABEL_POS 테이블 우선 사용
       LABEL_POS에 없는 코드는 getCenter() fallback으로 처리 */
    const pos = LABEL_POS[r.code] || getCenter(r.d);
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x', pos.x);
    lbl.setAttribute('y', pos.y);
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('class','rlabel'+(r.type==='metro'?' metro':'')+(r.code===selCode?' selected':''));
    lbl.setAttribute('pointer-events','none');
    lbl.textContent = r.name;

    path.addEventListener('mouseenter', function(){
      if(r.code !== selCode) this.setAttribute('fill', FILL_HOVER);
      const tt = document.getElementById('mtt');
      tt.textContent = `${r.name}  (${r.code})`;
      tt.style.opacity = '1';
    });
    path.addEventListener('mouseleave', function(){
      if(r.code !== selCode) this.setAttribute('fill', getFill(r.code));
      document.getElementById('mtt').style.opacity = '0';
    });
    path.addEventListener('click', function(){
      selCode = (selCode === r.code) ? '' : r.code;
      refreshMap();
      syncTabs();
      doSearch();
    });

    g.appendChild(path);
    g.appendChild(lbl);
    svg.appendChild(g);
  });
}

// path의 bbox 중심 계산 (LABEL_POS fallback용)
function getCenter(d){
  const nums = (d.match(/-?\d+\.?\d*/g)||[]).map(Number);
  const xs=[],ys=[];
  for(let i=0;i<nums.length-1;i+=2){xs.push(nums[i]);ys.push(nums[i+1]);}
  return {
    x:Math.round((Math.min(...xs)+Math.max(...xs))/2),
    y:Math.round((Math.min(...ys)+Math.max(...ys))/2)
  };
}

function refreshMap(){
  document.querySelectorAll('#kmap path[data-code]').forEach(p=>{
    const c=p.getAttribute('data-code');
    p.setAttribute('fill', getFill(c));
    p.className.baseVal='rpath'+(c===selCode?' selected':'');
  });
  document.querySelectorAll('#kmap text.rlabel').forEach(t=>{
    const c=t.previousElementSibling?.getAttribute('data-code');
    if(!c) return;
    const isMetro=t.classList.contains('metro');
    t.className.baseVal='rlabel'+(isMetro?' metro':'')+(c===selCode?' selected':'');
  });
}

/* ══════════════════════════════════════════════
   탭 ↔ 지도 동기화 (변경 없음)
══════════════════════════════════════════════ */
function syncTabs(){
  document.querySelectorAll('.rtab').forEach(t=>t.classList.toggle('on', t.dataset.c===selCode));
}
function pickRegion(el){
  selCode=el.dataset.c;
  syncTabs();
  refreshMap();
  doSearch();
}

/* ══════════════════════════════════════════════
   서버 헬스체크 (변경 없음)
══════════════════════════════════════════════ */
/* [변경] 서버 URL 입력창 토글 함수
   배지 클릭 시 srv-detail에 open 클래스를 붙이고 떼는 방식
   CSS의 max-height 트랜지션이 실제 애니메이션을 담당함
   toggle 패턴: classList.toggle('open') 한 번에 처리 */
function toggleSrvDetail() {
  const detail  = document.getElementById('srv-detail');
  const badge   = document.getElementById('srv-badge');
  const chevron = document.getElementById('srv-chevron');

  const isOpen = detail.classList.toggle('open');   // open이면 true 반환
  badge.classList.toggle('open', isOpen);           // 배지에도 open 동기화 (꺾쇠 회전용)

  /* 펼쳐질 때 input에 자동 포커스
     사용자가 바로 타이핑할 수 있도록 UX 개선 */
  if (isOpen) {
    setTimeout(() => document.getElementById('srv-url').focus(), 210);
  }
}
async function checkServer(){
  const dot=document.getElementById('srv-dot');
  const txt=document.getElementById('srv-txt');
  const base=document.getElementById('srv-url').value.trim().replace(/\/$/,'');
  dot.className='srv-dot chk'; txt.textContent='확인 중...';
  try{
    const today=new Date().toISOString().slice(0,10).replace(/-/g,'');
    const res=await fetch(`${base}/api/kopis?stdate=${today}&eddate=${today}&rows=1`,
      {signal:AbortSignal.timeout(4000)});
    if(res.ok){dot.className='srv-dot ok';txt.textContent='서버 연결됨';return true;}
    throw new Error(`HTTP ${res.status}`);
  }catch(e){
    dot.className='srv-dot err';
    txt.textContent=`연결 실패`;
    return false;
  }
}

/* ══════════════════════════════════════════════
   API URL 빌더 (변경 없음)
══════════════════════════════════════════════ */
function buildUrl(){
  const base=document.getElementById('srv-url').value.trim().replace(/\/$/,'');
  const st=document.getElementById('st').value.replace(/-/g,'');
  const ed=document.getElementById('ed').value.replace(/-/g,'');
  const genre=document.getElementById('sel-genre').value;
  const state=document.getElementById('sel-state').value;
  const p=new URLSearchParams({stdate:st,eddate:ed,cpage:'1',rows:'100'});
  if(selCode) p.set('signgucode',selCode);
  if(genre)   p.set('shcate',genre);
  if(state)   p.set('prfstate',state);
  return `${base}/api/kopis?${p}`;
}

/* ══════════════════════════════════════════════
   메인 조회 (변경 없음)
══════════════════════════════════════════════ */
async function doSearch(){
  const url=buildUrl();
  const genre=document.getElementById('sel-genre').value;
  const plist=document.getElementById('plist');
  const banner=document.getElementById('err-banner');
  document.getElementById('utext').textContent=url;
  document.getElementById('ltitle').textContent=
    `${REGION_LABEL[selCode]||'전체'}${genre?' · '+(GENRE_LABEL[genre]||''):''}`;
  document.getElementById('s-region').textContent=REGION_LABEL[selCode]||'전체';
  document.getElementById('s-genre').textContent=GENRE_LABEL[genre]||'전체';
  document.getElementById('s-total').textContent='–';
  document.getElementById('lcnt').textContent='0건';
  banner.style.display='none';
  document.getElementById('btn-go').disabled=true;
  plist.innerHTML='<div class="spin-wrap"><div class="spin"></div>불러오는 중...</div>';
  try{
    const res=await fetch(url,{signal:AbortSignal.timeout(10000)});
    if(!res.ok) throw{type:'http',status:res.status};
    const json=await res.json();
    if(json.status!=='success') throw{type:'api',detail:json.detail||'응답 오류'};
    const items=json.data||[];
    const total=json.total_count??items.length;
    document.getElementById('s-total').textContent=total;
    document.getElementById('lcnt').textContent=`${total}건`;
    if(!items.length){
      plist.innerHTML='<div class="smsg"><i class="ti ti-calendar-off" style="font-size:26px;display:block;margin-bottom:8px;opacity:.35" aria-hidden="true"></i>해당 조건의 공연이 없습니다</div>';
      return;
    }
    plist.innerHTML='';
    items.forEach(item=>{
      const isOpen=item.openrun==='Y';
      const stClass=STATE_CLASS[item.prfstate]||'tag-end';
      const card=document.createElement('div');
      card.className='pitem';
      card.setAttribute('role','button');
      card.innerHTML=`
        <div class="poster">${item.poster
          ?`<img src="${item.poster}" alt="${item.prfnm} 포스터" loading="lazy"
              onerror="this.parentElement.innerHTML='<i class=\\'ti ti-photo\\' style=\\'font-size:15px;color:var(--color-text-tertiary)\\'></i>'">`
          :`<i class="ti ti-photo" style="font-size:15px;color:var(--color-text-tertiary)" aria-hidden="true"></i>`}
        </div>
        <div class="pinfo">
          <div class="ptitle" title="${item.prfnm}">${item.prfnm}</div>
          <div class="pvenue">${item.fcltynm}</div>
          <div class="pdate">${item.prfpdfrom} ~ ${item.prfpdto}</div>
          <div class="ptags">
            <span class="tag">${item.genrenm||'–'}</span>
            <span class="tag ${stClass}">${item.prfstate||'–'}</span>
            ${isOpen?'<span class="tag tag-open">오픈런</span>':''}
          </div>
        </div>`;
      card.addEventListener('click',()=>{
        sendPrompt(`KOPIS 공연 "${item.prfnm}" (ID: ${item.mt20id}) 상세 조회 FastAPI 엔드포인트 GET /api/kopis/detail/{mt20id} 를 작성해줘.`);
      });
      plist.appendChild(card);
    });
  }catch(err){
    const isNet=err instanceof TypeError||err?.name==='AbortError';
    plist.innerHTML=`<div class="smsg"><i class="ti ti-server-off" style="font-size:26px;display:block;margin-bottom:8px;opacity:.35" aria-hidden="true"></i>${isNet?'FastAPI 서버에 연결할 수 없습니다':'API 응답 오류'}<br><span style="font-size:10px;color:var(--color-text-tertiary)">${isNet?'uvicorn main:app --reload':'HTTP '+(err?.status||'')}</span></div>`;
    banner.style.display='block';
    banner.textContent=isNet?'서버 실행: uvicorn main:app --reload':'서버 오류: '+(err?.status||err?.detail||'');
    document.getElementById('s-total').textContent='–';
  }finally{
    document.getElementById('btn-go').disabled=false;
  }
}

/* ══════════════════════════════════════════════
   페이지 로드 시: 기본 날짜 자동 세팅 (오늘 ~ 한 달 뒤)
══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // 회원님의 HTML에 맞춰 아이디를 'st', 'ed'로 정확히 수정했습니다!
  const startDateInput = document.getElementById('st'); 
  const endDateInput = document.getElementById('ed');

  if (startDateInput && endDateInput) {
    const today = new Date();
    const nextMonth = new Date();
    nextMonth.setMonth(today.getMonth() + 1);

    // YYYY-MM-DD 형태로 변환해주는 함수
    const formatDate = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    // 달력 칸에 오늘 날짜와 한 달 뒤 날짜 주입!
    startDateInput.value = formatDate(today);
    endDateInput.value = formatDate(nextMonth);
  }
});
